version: 2
updates:
  # Keep GitHub Actions pinned versions fresh.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Go modules (no third-party deps today, but catches the Go directive and any
  # future additions).
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: build

  # Base image updates for the Dockerfile.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
