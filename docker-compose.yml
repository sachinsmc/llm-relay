services:
  llm-relay:
    build: .
    image: llm-relay:latest
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DAILY_CAP: "${DAILY_CAP:-0}"
      PROVIDER: "${PROVIDER:-groq}"
      FALLBACK: "${FALLBACK:-}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      GROQ_MODEL: "${GROQ_MODEL:-llama-3.3-70b-versatile}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-openai/gpt-4o-mini}"
      NO_TRAIN: "${NO_TRAIN:-false}"
    restart: unless-stopped
    healthcheck:
      # distroless has no shell; exec the binary's own healthcheck against /healthz.
      test: ["CMD", "/llm-relay", "-healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
